<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2c970"/>
      <stop offset="50%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#a08535"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0d"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.3"/>
  <!-- É letter -->
  <text x="256" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="320" font-weight="700" font-style="italic" fill="url(#gold)">É</text>
  <!-- Subtle vein accent -->
  <line x1="80" y1="420" x2="432" y2="420" stroke="url(#gold)" stroke-width="3" opacity="0.2"/>
</svg>